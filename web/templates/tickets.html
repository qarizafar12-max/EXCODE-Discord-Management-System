{% extends "layout.html" %}

{% block content %}
<div class="dashboard-header fade-in">
    <h1><i class="fa-solid fa-ticket"></i> Active Tickets</h1>
    <p>View currently open support tickets.</p>
</div>

<div class="loader-box glass fade-in">
    <input type="text" id="guild-id-input" placeholder="Enter Guild ID..." class="input-field">
    <button class="btn primary" onclick="loadTickets()">Load Tickets</button>
</div>

<div id="tickets-container" class="settings-grid hidden">
    <!-- Tickets will be injected here -->
</div>

<!-- Transcript Modal -->
<div id="transcript-modal" class="modal hidden" onclick="closeModal()">
    <div class="modal-content glass" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2><i class="fa-solid fa-comments"></i> Ticket Transcript</h2>
            <div style="display:flex; gap:0.5rem; align-items: center;">
                <div id="sentiment-display" style="margin-right: 1rem; font-size: 0.9rem;"></div>
                <button class="btn sm" style="background:var(--accent-purple);" onclick="analyzeTicketSentiment()"><i
                        class="fa-solid fa-brain"></i> AI Analysis</button>
                <button class="btn sm" style="background:var(--danger);" onclick="closeTicketFromWeb()"><i
                        class="fa-solid fa-lock"></i> Close Ticket</button>
                <button class="btn sm" onclick="closeModal()"><i class="fa-solid fa-times"></i></button>
            </div>
        </div>
        <div id="chat-box" class="chat-box">
            <!-- Messages go here -->
        </div>
    </div>
</div>

<script>
    function loadTickets() {
        const gid = document.getElementById('guild-id-input').value;
        if (!gid) return alert("Enter Guild ID");

        const container = document.getElementById('tickets-container');
        container.innerHTML = '<div class="glass" style="padding:2rem; text-align:center;">Loading...</div>';
        container.classList.remove('hidden');

        fetch(`/api/tickets/${gid}`)
            .then(r => r.json())
            .then(tickets => {
                container.innerHTML = '';

                if (tickets.length === 0) {
                    container.innerHTML = '<div class="glass" style="padding:2rem; text-align:center;">No open tickets found.</div>';
                    return;
                }

                tickets.forEach(t => {
                    const date = new Date(t.created_at).toLocaleString();
                    const ticketId = String(t.channel_id); // Preserve large number precision
                    const priorityClass = `priority-${t.priority.toLowerCase()}`;

                    const card = `
                    <div class="card glass slide-up" oncontextmenu="showTicketMenu(event, '${ticketId}')">
                        <div class="icon-box green"><i class="fa-solid fa-envelope-open-text"></i></div>
                        <div class="card-info" style="flex:1;">
                            <h3 style="margin:0; font-size:1rem;">Opened by: ${t.owner_name} <small style="color:#555">(${t.owner_id})</small></h3>
                            <h2 style="font-size:1.2rem; margin: 5px 0 2px 0;">Ticket #${ticketId}</h2>
                            <p style="font-size:0.8rem; color:#aaa;">Assigned to: ${t.assigned_name}</p>
                            <p style="font-size:0.8rem; color:#888;">${date}</p>
                        </div>
                        <div class="badge-container" style="padding: 0 1rem;">
                            <span class="badge ${priorityClass}">${t.priority}</span>
                        </div>
                        <div class="actions">
                             <button class="btn sm" onclick="viewTranscript('${ticketId}')">View Chat</button>
                        </div>
                    </div>
                `;
                    container.innerHTML += card;
                });
            });
    }

    let currentTicketId = null;

    function viewTranscript(ticketId) {
        currentTicketId = ticketId;
        const modal = document.getElementById('transcript-modal');
        const chatBox = document.getElementById('chat-box');

        chatBox.innerHTML = '<div style="text-align:center; padding:2rem;">Loading messages...</div>';
        modal.classList.remove('hidden');

        fetch(`/api/ticket_transcript/${ticketId}`)
            .then(r => r.json())
            .then(msgs => {
                console.log('Loaded messages:', msgs); // Debug
                chatBox.innerHTML = '';

                if (!msgs || msgs.length === 0) {
                    chatBox.innerHTML = '<div style="text-align:center; padding:2rem; color:#888;">No messages logged for this ticket yet.<br><small>Messages are only logged after the latest bot update.</small></div>';
                    return;
                }

                msgs.forEach(m => {
                    const isBot = m.is_bot ? 'bot-msg' : 'user-msg';
                    const time = new Date(m.timestamp).toLocaleTimeString();
                    const content = m.content || '(No content)';
                    const msgDiv = `
                        <div class="message ${isBot}">
                            <div class="msg-header">
                                <span class="author">${m.author_name}</span>
                                <span class="time">${time}</span>
                            </div>
                            <div class="msg-content">${content}</div>
                        </div>
                    `;
                    chatBox.innerHTML += msgDiv;
                });

                // Scroll to bottom
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(err => {
                console.error('Error loading transcript:', err);
                chatBox.innerHTML = '<div style="text-align:center; padding:2rem; color:red;">Error loading transcript. Check console.</div>';
            });
    }

    function closeModal() {
        document.getElementById('transcript-modal').classList.add('hidden');
        document.getElementById('sentiment-display').innerHTML = '';
        currentTicketId = null;
    }

    function analyzeTicketSentiment() {
        if (!currentTicketId) return;
        const display = document.getElementById('sentiment-display');
        display.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Analyzing...';

        fetch(`/api/analyze_sentiment/${currentTicketId}`)
            .then(r => r.json())
            .then(data => {
                let color = 'var(--text-secondary)';
                if (data.sentiment === 'Positive') color = 'var(--accent-green)';
                if (data.sentiment === 'Negative') color = 'var(--danger)';

                display.innerHTML = `Sentiment: <b style="color:${color}">${data.sentiment}</b> (${data.score.toFixed(2)})`;
            })
            .catch(err => {
                display.innerHTML = '<span style="color:var(--danger)">Analysis failed</span>';
            });
    }

    function closeTicketFromWeb() {
        if (!currentTicketId) return alert('No ticket selected');

        if (!confirm('Are you sure you want to close this ticket? This will delete the channel in Discord.')) {
            return;
        }

        // Get guild ID from input
        const guildId = document.getElementById('guild-id-input').value;
        if (!guildId) return alert('Guild ID not found');

        console.log('Closing Ticket:', currentTicketId, 'in Guild:', guildId); // Debug

        fetch('/api/send_action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                guild_id: guildId,
                action: 'close_ticket',
                ticket_id: String(currentTicketId)
            })
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('Ticket close request sent!');
                    closeModal();
                    // Refresh tickets list
                    setTimeout(loadTickets, 1000);
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(err => alert('Network error: ' + err));
    }

    // --- Context Menu Logic ---
    const contextMenu = document.createElement('div');
    contextMenu.className = 'context-menu hidden glass';
    document.body.appendChild(contextMenu);

    document.addEventListener('click', () => contextMenu.classList.add('hidden'));

    function showTicketMenu(e, ticketId) {
        e.preventDefault();
        currentTicketId = ticketId;

        const guildId = document.getElementById('guild-id-input').value;

        contextMenu.innerHTML = `
            <div class="menu-item" onclick="viewTranscript('${ticketId}')"><i class="fa-solid fa-comments"></i> View Chat</div>
            <div class="menu-item" onclick="openPriorityDialog('${ticketId}')"><i class="fa-solid fa-bolt"></i> Set Priority</div>
            <div class="menu-item" onclick="openTransferDialog('${ticketId}', '${guildId}')"><i class="fa-solid fa-user-plus"></i> Transfer</div>
            <div class="menu-divider"></div>
            <div class="menu-item danger" onclick="closeTicketFromWeb()"><i class="fa-solid fa-lock"></i> Close Ticket</div>
        `;

        contextMenu.style.top = `${e.pageY}px`;
        contextMenu.style.left = `${e.pageX}px`;
        contextMenu.classList.remove('hidden');
    }

    function openPriorityDialog(ticketId) {
        const priority = prompt("Enter Priority (Low, Normal, High, Urgent):", "Normal");
        if (!priority) return;

        sendAction('update_priority', { ticket_id: ticketId, priority: priority });
    }

    function openTransferDialog(ticketId, guildId) {
        const adminId = prompt("Enter Admin ID to transfer to:");
        if (!adminId) return;

        sendAction('transfer_ticket', { ticket_id: ticketId, admin_id: adminId });
    }

    function sendAction(action, payload) {
        const guildId = document.getElementById('guild-id-input').value;
        fetch('/api/send_action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                guild_id: guildId,
                action: action,
                ...payload
            })
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) alert("Action sent to bot!");
                else alert("Error: " + data.error);
                setTimeout(loadTickets, 1000);
            });
    }
</script>

<style>
    /* Modal Styles */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
    }

    .modal.hidden {
        display: none !important;
    }

    .modal-content {
        width: 80%;
        max-width: 800px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        padding: 0 !important;
        /* Override glass padding */
        overflow: hidden;
    }

    .modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .message {
        max-width: 80%;
        padding: 1rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
    }

    .message.user-msg {
        align-self: flex-start;
        border-top-left-radius: 2px;
    }

    .message.bot-msg {
        align-self: flex-end;
        background: rgba(88, 166, 255, 0.15);
        border-top-right-radius: 2px;
    }

    .msg-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-size: 0.8rem;
        color: var(--text-secondary);
    }

    .author {
        font-weight: bold;
        color: var(--text-primary);
    }

    /* Priority Badges */
    .badge {
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: bold;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: normal;
    }

    .priority-low {
        background: rgba(128, 128, 128, 0.2);
        color: #aaa;
        border: 1px solid rgba(128, 128, 128, 0.3);
    }

    .priority-normal {
        background: rgba(46, 204, 113, 0.2);
        color: #2ecc71;
        border: 1px solid rgba(46, 204, 113, 0.3);
    }

    .priority-high {
        background: rgba(52, 152, 219, 0.2);
        color: #3498db;
        border: 1px solid rgba(52, 152, 219, 0.3);
    }

    .priority-urgent {
        background: rgba(231, 76, 60, 0.2);
        color: #e74c3c;
        border: 1px solid rgba(231, 76, 60, 0.4);
        animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
        0% {
            box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
        }

        70% {
            box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
        }
    }

    /* Context Menu */
    .context-menu {
        position: absolute;
        min-width: 180px;
        z-index: 10000;
        padding: 0.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .context-menu.hidden {
        display: none;
    }

    .menu-item {
        padding: 0.8rem 1rem;
        cursor: pointer;
        border-radius: 6px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-size: 0.9rem;
    }

    .menu-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .menu-item.danger:hover {
        background: rgba(231, 76, 60, 0.2);
        color: #e74c3c;
    }

    .menu-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 0.4rem 0;
    }
</style>
{% endblock %}
